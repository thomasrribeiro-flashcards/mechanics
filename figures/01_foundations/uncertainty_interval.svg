<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Estimate and symmetric uncertainty interval</title>
  <desc id="desc">A number line highlights the interval from 12.3 to 12.5 centimeters with bracket endpoints and a distinct central estimate marker at 12.4 centimeters.</desc>
  <defs><pattern id="dots" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="2" fill="#8a6500"/></pattern></defs>
  <style>
    .axis{stroke:#171717;stroke-width:4}.interval{stroke:#8a6500;stroke-width:14;stroke-linecap:butt}.end{stroke:#171717;stroke-width:5}.label{font:700 22px system-ui,sans-serif;fill:#171717;text-anchor:middle}.caption{font:600 18px system-ui,sans-serif;fill:#4a4a4a;text-anchor:middle}
  </style>
  <rect width="720" height="360" rx="24" fill="#fff"/>
  <text class="caption" x="360" y="58">estimate ± uncertainty</text>
  <line class="axis" x1="80" y1="190" x2="640" y2="190"/>
  <line class="interval" x1="205" y1="190" x2="515" y2="190"/>
  <line class="end" x1="205" y1="155" x2="205" y2="225"/><line class="end" x1="515" y1="155" x2="515" y2="225"/>
  <circle cx="360" cy="190" r="25" fill="#f5c542" stroke="#171717" stroke-width="5"/>
  <circle cx="360" cy="190" r="12" fill="url(#dots)"/>
  <text class="label" x="205" y="276">12.3 cm</text><text class="label" x="360" y="130">12.4 cm</text><text class="label" x="515" y="276">12.5 cm</text>
  <text class="caption" x="360" y="326">symmetric interval</text>
</svg>
