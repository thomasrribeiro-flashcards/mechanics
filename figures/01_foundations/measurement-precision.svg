<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">Measurement on a ruler with an estimated final digit</title>
  <desc id="desc">A ruler marked every one tenth of a centimeter. A yellow object's endpoint lies between 3.4 and 3.5 centimeters, about sixty percent of the way across that interval.</desc>
  <rect width="720" height="240" fill="#ffffff"/>
  <text x="360" y="28" text-anchor="middle" font-family="monospace" font-size="16" fill="#1a1a1a">smallest marked division: 0.1 cm</text>

  <line x1="60" y1="72" x2="579" y2="72" stroke="#F5C842" stroke-width="16"/>
  <line x1="60" y1="54" x2="60" y2="90" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="579" y1="49" x2="579" y2="95" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="579" cy="72" r="7" fill="#F5C842" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="579" y1="95" x2="579" y2="138" stroke="#777777" stroke-width="1.5" stroke-dasharray="5 4"/>

  <line x1="60" y1="140" x2="660" y2="140" stroke="#1a1a1a" stroke-width="3"/>
  <g stroke="#1a1a1a" stroke-width="2">
    <line x1="60" y1="140" x2="60" y2="174"/>
    <line x1="210" y1="140" x2="210" y2="174"/>
    <line x1="360" y1="140" x2="360" y2="174"/>
    <line x1="510" y1="140" x2="510" y2="174"/>
    <line x1="660" y1="140" x2="660" y2="174"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="1.5">
    <path d="M75 140v18 M90 140v18 M105 140v18 M120 140v18 M135 140v18 M150 140v18 M165 140v18 M180 140v18 M195 140v18"/>
    <path d="M225 140v18 M240 140v18 M255 140v18 M270 140v18 M285 140v18 M300 140v18 M315 140v18 M330 140v18 M345 140v18"/>
    <path d="M375 140v18 M390 140v18 M405 140v18 M420 140v18 M435 140v18 M450 140v18 M465 140v18 M480 140v18 M495 140v18"/>
    <path d="M525 140v18 M540 140v18 M555 140v18 M570 140v18 M585 140v18 M600 140v18 M615 140v18 M630 140v18 M645 140v18"/>
  </g>
  <g font-family="monospace" font-size="16" fill="#1a1a1a" text-anchor="middle">
    <text x="60" y="198">0</text>
    <text x="210" y="198">1</text>
    <text x="360" y="198">2</text>
    <text x="510" y="198">3</text>
    <text x="660" y="198">4 cm</text>
  </g>
</svg>
