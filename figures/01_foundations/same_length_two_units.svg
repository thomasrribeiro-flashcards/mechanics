<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">The same length in two units</title>
  <desc id="desc">A single gold bar spans identical endpoints on two black scales. The upper scale reads zero to twenty-five centimeters and the lower scale reads zero to zero point two five meter.</desc>
  <style>
    .axis{stroke:#171717;stroke-width:4}.tick{stroke:#171717;stroke-width:3}.minor{stroke:#666;stroke-width:2}
    .label{font:700 22px system-ui,sans-serif;fill:#171717;text-anchor:middle}.caption{font:600 18px system-ui,sans-serif;fill:#4a4a4a;text-anchor:middle}
  </style>
  <rect width="720" height="360" rx="24" fill="#fff"/>
  <text class="caption" x="360" y="42">one unchanged bar</text>
  <rect x="110" y="68" width="500" height="55" rx="10" fill="#f5c542" stroke="#171717" stroke-width="3"/>
  <line class="axis" x1="110" y1="174" x2="610" y2="174"/>
  <line class="tick" x1="110" y1="158" x2="110" y2="190"/><line class="tick" x1="610" y1="158" x2="610" y2="190"/>
  <line class="minor" x1="210" y1="164" x2="210" y2="184"/><line class="minor" x1="310" y1="164" x2="310" y2="184"/><line class="minor" x1="410" y1="164" x2="410" y2="184"/><line class="minor" x1="510" y1="164" x2="510" y2="184"/>
  <text class="label" x="110" y="220">0 cm</text><text class="label" x="610" y="220">25 cm</text>
  <line class="axis" x1="110" y1="270" x2="610" y2="270"/>
  <line class="tick" x1="110" y1="254" x2="110" y2="286"/><line class="tick" x1="610" y1="254" x2="610" y2="286"/>
  <text class="label" x="110" y="322">0 m</text><text class="label" x="610" y="322">0.25 m</text>
</svg>
