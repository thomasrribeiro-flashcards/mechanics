<title id='title'>Centimetre ruler and measured strip</title>
<desc id='desc'>A ruler runs from zero to four centimetres with ten equal subdivisions per centimetre. A blue outlined strip begins at zero and ends at mark X at 3.4 centimetres, indicated by a dashed guide.</desc>
