<title id='title'>Power-of-ten scale</title>
<desc id='desc'>A horizontal logarithmic scale has equal exponent steps from ten to the minus three through ten to the third. A striped marker P is at ten to the minus two and a gold marker Q is at ten to the first.</desc>
